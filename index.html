<!DOCTYPE html>
<html>
<head>
    <title>Space Mission</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
<div id="instructionModal" class="modal">

    <div class="modalBox">

        <button id="closeModal">✖</button>

        <h2>Space Mission</h2>

        <p>
            Your mission is to land the rocket on the moving landing pad.
        </p>

        <p>
            Controls:
            <br>
            Hold <b>SPACE</b> to activate the thrusters!
        </p>

        <p>
            Land in under <b>10 seconds</b> to complete the mission!
        </p>

    </div>

</div>
<canvas id="gameCanvas"></canvas>

<button id="fastButton">Fast Mode</button>
<button id="startButton">START MISSION</button>
<button id="restartButton">RESTART</button>
<button id="backgroundButton">Change Background</button>
<button id="slowButton">Slow Mode</button>

<script src="script.js"></script>

</body>
</html>
